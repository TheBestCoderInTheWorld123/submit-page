<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Submit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #0070f3;
      color: white;
    }

    /* Spinner */
    .spinner {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #ccc;
      border-top: 4px solid #0070f3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Submit Assignment</h2>
    <button id="btn" onclick="handleClick()">Submit</button>
    <div class="spinner" id="spinner"></div>
    <div id="message"></div>
  </div>

  <script>
    let count = 0;

    function handleClick() {
      count++;

      if (count >= 20) {
        startLoading();
      }
    }

    function startLoading() {
      const spinner = document.getElementById('spinner');
      const msg = document.getElementById('message');
      const btn = document.getElementById('btn');

      btn.disabled = true;
      spinner.style.display = 'block';
      msg.textContent = '';

      setTimeout(() => {
        spinner.style.display = 'none';
        msg.textContent = 'Assignment Submitted.';
      }, 2000);
    }
  </script>
</body>
</html>
